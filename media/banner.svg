<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <clipPath id="r"><rect width="800" height="200" rx="16"/></clipPath>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/><stop offset="100%" stop-color="#14141f"/>
    </linearGradient>
    <filter id="b1"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>
  <g clip-path="url(#r)">
    <rect width="800" height="200" fill="url(#bg)"/>
    <ellipse cx="150" cy="180" rx="200" ry="120" fill="#0056A0" opacity="0.15" filter="url(#b1)"/>
    <ellipse cx="650" cy="20" rx="200" ry="120" fill="#FFB81C" opacity="0.1" filter="url(#b1)"/>
    <rect width="800" height="2" fill="#0056A0" opacity="0.6"/>
    <text x="400" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="32" fill="#fff" font-weight="700" letter-spacing="1">awesome-comunitat-valenciana</text>
    <rect x="250" y="86" width="300" height="2" rx="1" fill="#0056A0" opacity="0.5"/>
    <text x="400" y="116" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" font-weight="300" letter-spacing="3">SOFTWARE OPEN SOURCE PARA LA COMUNITAT VALENCIANA</text>
    <!-- 4 barres: stylized vertical bars from the Senyera -->
    <g fill="#FFB81C" opacity="0.5" transform="translate(400,155)">
      <rect x="-45" y="0" width="8" height="24" rx="2"/>
      <rect x="-15" y="0" width="8" height="24" rx="2"/>
      <rect x="15" y="0" width="8" height="24" rx="2"/>
      <rect x="45" y="0" width="8" height="24" rx="2"/>
    </g>
  </g>
</svg>
